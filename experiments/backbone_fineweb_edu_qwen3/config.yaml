# Track 2 · Shared backbone · Protocol B (Qwen3-1.7B working architecture)
#
# All Track 2 cooldown-fork experiments under Protocol B branch from this
# checkpoint. Trained ONCE, reused by all forks (per ADR 0004 + 0007).
#
# Expected runtime: ~1.3 days on 8×H100.

exp_id: backbone_fineweb_edu_qwen3
stage: P1
track: 1   # backbone training itself is standalone-style; subsequent forks are Track 2
branch_from: null

dataset:
  id: fineweb_edu_backbone_qwen
  path: data/datasets/fineweb_edu_backbone_qwen
  tokens: 30_000_000_000
  notes: >
    Re-tokenized from data/reference/fineweb_edu_dedup/ (32 shards) with
    Qwen2.5 tokenizer (151k BBPE) for Protocol B.
    Use first 20B tokens via nanotron's consumed-samples mechanism.

model:
  arch: qwen3-1.7B
  seq_len: 2048
  tokenizer: Qwen/Qwen2.5-1.5B
  vocab_size: 151665        # = len(Qwen/Qwen2.5-1.5B tokenizer .get_vocab())
  init_from: null

training:
  train_tokens: 20_000_000_000
  global_batch_tokens: 1_310_720
  micro_batch_size: 4
  seed: 42
  mixed_precision: bf16
  gradient_clip: 1.0
  weight_decay: 0.1
  schedule:
    scheduler: trapezoidal
    lr_max: 3.0e-4
    lr_min: 3.0e-4          # backbone: keep LR at peak through end (NO cooldown here)
    warmup_tokens: 500_000_000
    stable_tokens: 19_500_000_000
    cooldown_tokens: 0

eval:
  task_group: cosmopedia-full
  max_samples: null
  eval_every_tokens: 5_000_000_000
  final_eval: true

notes: >
  Protocol B shared backbone for all Track 2 Qwen3 cooldown-forks.
  Once final ckpt is saved, PROTECT FROM DELETION; future cooldown-fork
  configs set `branch_from: backbone_fineweb_edu_qwen3:final` and
  `model.init_from: <ckpt_path>`.
