# Track 1 · Standalone reproduction baseline · Protocol A (Llama2-1.82B reference anchor)
# Goal: reproduce cosmopedia v2 scores on the FineWeb 1.82B / 30B-token protocol,
#       serves as the EXTERNAL ANCHOR (ADR 0007) — verifies pipeline correctness
#       by aligning to SmolLM/FineWeb published numbers (±0.5pp).
# Pair with seed=1337 for 2-seed averaged baseline.
# All Incepedia version comparisons run on Protocol B (Qwen3-1.7B) instead.
#
# Expected runtime: ~2.1 days on 8×H100 per seed (run 2 seeds for ±0.15pp error bar).
# Expected compute: 400 H100-hours per seed.

exp_id: exp_ref_cosmopedia_v2_seed42
stage: P1
track: 1
branch_from: null

dataset:
  id: cosmopedia_v2_reference
  path: data/datasets/cosmopedia_v2_reference
  tokens: 28_000_000_000
  notes: >
    Raw parquet at data/reference/cosmopedia_v2/cosmopedia-v2/*.parquet;
    tokenized shards produced by scripts/tokenize_dataset.py

model:
  arch: llama2-1.82B
  seq_len: 2048
  tokenizer: mistralai/Mistral-7B-v0.1
  vocab_size: 32000
  init_from: null

training:
  train_tokens: 30_000_000_000
  global_batch_tokens: 1_310_720
  micro_batch_size: 4
  seed: 42
  mixed_precision: bf16
  gradient_clip: 1.0
  weight_decay: 0.1
  schedule:
    scheduler: trapezoidal
    lr_max: 3.0e-4
    lr_min: 0.0
    warmup_tokens: 500_000_000
    stable_tokens: 24_000_000_000
    cooldown_tokens: 5_500_000_000

eval:
  task_group: early-signal
  max_samples: 1000
  eval_every_tokens: 2_000_000_000
  final_eval: true

notes: >
  Reference baseline for Track 1. Pair with seed=1337 for 2-seed average.
  Success = lighteval early-signal average within ±0.5pp of SmolLM blog
  Cosmopedia-v2 reference run numbers.
